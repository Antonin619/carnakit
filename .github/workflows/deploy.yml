name: Deploy Develop Branch 

on:
  push:
    branches:
      - main

jobs:
  checkout_build_and_deploy:
    runs-on: ubuntu-latest
    steps:

      - name : Checkout Repo
        uses : actions/checkout@v3

      # - name: Extract and fill develop vars and secrets.
      #   if: github.ref == 'refs/heads/develop'
      #   run: |
      #     echo "${{ vars.develop_ENV_FILE }}" >> .env

      - name : Extract and fill [COMMONS] vars and secrets. 
        run: |
          echo "${{vars.ENV_FILE}}" >> .env
          cat .env

      - name : Install dependencies
        run: npm install
      
      - name : Build the project
        run: npm run build

      - name: Set repository name as environment variable
        run: echo "REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)" >> $GITHUB_ENV

      - name : Copy to server, run app and reload nginx config 
        uses: yitianyigexiangfa/ssh-scp-ssh-pipelines@v1.1.5
        with:
          host: ${{ vars.HOST_IP }}
          user: ${{ vars.HOST_USERNAME }}
          pass: ${{ secrets.HOST_PASSWORD }}
          first_ssh: |
              rm -rf $REPO_NAME/**/* || mkdir $REPO_NAME
          scp: |
              ./.output/* => $REPO_NAME
          last_ssh: |
              pm2 restart $REPO_NAME || pm2 start $REPO_NAME/server/index.mjs --name $REPO_NAME
              pm2 save